services:
  - type: web
    name: exp13-students-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exp13-students-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9.0

databases:
  - name: exp13-students-db
    databaseName: students
    user: students_user
